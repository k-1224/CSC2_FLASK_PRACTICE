<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Website</title>
  </head>
  <body>
    <header>

    </header>
    <main>
      <h2>Displaying JSON flower data</h2>
    </main>
    <ul>
      {% for flower, details in flowers.items() %}
      <li>{{ flower }} - ${{ details['price'] }} (Stock: {{ details['stock'] }})</li>
      {% endfor %}
    </ul>
    <ul>
      {% for addon, details in addons.items() %}
      <li>{{ addon }} - ${{ details['price'] }}</li>
      {% endfor %}
    </ul>
    <footer>

    </footer>
  </body>
</html>
